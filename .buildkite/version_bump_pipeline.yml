notify:
  - slack:
      channels:
        - "#logstash-build"
    if: (build.branch == 'main' || build.branch =~ /^[0-9]+\.[0-9x]+\$/) && (build.state == 'passed' || build.state == 'failed')
  - slack:
      channels:
        - "#logstash-build"
      message: |
        🚦 Pipeline waiting for approval 🚦
        Repo: `${REPO}`

        Ready to fetch DRA artifacts - please unblock when ready.
        New version: `${NEW_VERSION}`
        Branch: `${BRANCH}`
        Workflow: `${WORKFLOW}`
        ${BUILDKITE_BUILD_URL}
    if: build.state == "blocked"

steps:
  - label: "Bump version minor"
    # NOTE: a new minor is X.Y.0, so we check if the version ends with 0
    #       to decide if it's a minor or patch release
    if: build.env("NEW_VERSION") =~ /0$/
    plugins:
      - elastic/vault-github-token#v0.1.0:
      - elastic/gh-cli#v0.1.0:
          version: "2.62.0"
          wait: true
          workflow-file: "version_bumps.yml"
          workflow-ref: "main"
          workflow-inputs:
            branch: "${BRANCH}"
            bump: "minor"

  - label: "Bump version patch"
    # NOTE: a new patch is X.Y.Z, so we check if the version ends with 0
    #       to decide if it's a minor or patch release
    if: build.env("NEW_VERSION") !~ /0$/
    plugins:
      - elastic/vault-github-token#v0.1.0:
      - elastic/gh-cli#v0.1.0:
          version: "2.62.0"
          wait: true
          workflow-file: "version_bumps.yml"
          workflow-ref: "main"
          workflow-inputs:
            branch: "${BRANCH}"
            bump: "patch"

  - block: "Ready to fetch for DRA artifacts?"
    prompt: |
      Unblock when your team is ready to proceed.

      Trigger parameters:
      - NEW_VERSION: ${NEW_VERSION}
      - BRANCH: ${BRANCH}
      - WORKFLOW: ${WORKFLOW}
    key: block-get-dra-artifacts
    blocked_state: running

  - label: "Fetch DRA Artifacts"
    key: fetch-dra-artifacts
    depends_on: block-get-dra-artifacts
    agents:
      image: docker.elastic.co/release-eng/wolfi-build-essential-release-eng:latest
      cpu: 250m
      memory: 512Mi
      ephemeralStorage: 1Gi
    command:
      - echo "Starting DRA artifacts retrieval..."
    timeout_in_minutes: 240
    retry:
      automatic:
        - exit_status: "*"
          limit: 2
      manual:
        permit_on_passed: true

    plugins:
      - elastic/json-watcher#v1.0.0:
          url: "https://artifacts-staging.elastic.co/logstash/latest/${BRANCH}.json"
          field: ".version"
          expected_value: "${NEW_VERSION}"
          polling_interval: "30"
      - elastic/json-watcher#v1.0.0:
          url: "https://storage.googleapis.com/elastic-artifacts-snapshot/logstash/latest/${BRANCH}.json"
          field: ".version"
          expected_value: "${NEW_VERSION}-SNAPSHOT"
          polling_interval: "30"
