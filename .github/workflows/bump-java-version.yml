name: Update JDK Version
on:
  schedule:
    # Run weekly on Mondays at midnight UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    
permissions:
  pull-requests: write
  contents: write

jobs:
  update_jdk_version:
    name: Update JDK Version
    runs-on: ubuntu-latest
    steps:
      - name: Fetch logstash-core team member list
        if: github.event_name == 'workflow_dispatch'
        uses: tspascoal/get-user-teams-membership@57e9f42acd78f4d0f496b3be4368fc5f62696662 #v3.0.0
        id: checkUserMember
        with: 
          username: ${{ github.actor }}
          organization: elastic
          team: logstash
          GITHUB_TOKEN: ${{ secrets.READ_ORG_SECRET_JSVD }}
          
      - name: Is user a core team member?
        if: github.event_name == 'workflow_dispatch' && steps.checkUserMember.outputs.isTeamMember == 'false'
        run: exit 1
        
      - name: Checkout repo content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          
      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - run: git config --global user.email "43502315+logstashmachine@users.noreply.github.com"
      - run: git config --global user.name "logstashmachine"
      
      - name: Check and update JDK version
        run: ./ci/check_jdk_version_availability.sh
        
      - name: Check for changes
        id: verify-changed-files
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "T=$(date +%s)" >> $GITHUB_ENV
            echo "BRANCH=update_jdk_${T}" >> $GITHUB_ENV
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No JDK version changes needed"
          fi
          
      - name: Create branch and commit changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git checkout -b $BRANCH
          git add versions.yml
          git status
          git commit -m "Update JDK version in versions.yml"
          git push origin $BRANCH
          
      - name: Create Pull Request
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               -X POST \
               -d "{
                 \"title\": \"chore: Update JDK version to latest\",
                 \"head\": \"${BRANCH}\",
                 \"base\": \"main\",
                 \"body\": \"This PR updates the JDK version in \`versions.yml\` to the latest available version from the Elastic JVM catalog.\\n\\nThis change was automatically generated by the \`update-jdk-version\` workflow.\"
               }" \
               https://api.github.com/repos/elastic/logstash/pulls
